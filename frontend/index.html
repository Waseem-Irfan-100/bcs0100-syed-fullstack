<!DOCTYPE html>
<html>
<body>

<h1>Student Details</h1>
<p id="data"></p>

<script>
fetch("http://localhost:5000/student-details")
.then(response => response.json())
.then(data => {
    document.getElementById("data").innerHTML =
        "Name: " + data.name + "<br>" +
        "Roll: " + data.roll;
})
.catch(error => console.error("Error:", error));
</script>

</body>
</html>
